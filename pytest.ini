[pytest]
pythonpath = .
markers =
    unit: small, fast tests for individual components
    integration: tests that verify the interaction between multiple modules
    performance: latency and throughput benchmarks (slow, excluded from core CI)
    slow: tests that take a significant amount of time to run
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = --strict-markers --disable-warnings
